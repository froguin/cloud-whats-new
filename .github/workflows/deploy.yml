name: Deploy All
on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      worker: ${{ steps.filter.outputs.worker }}
      pages: ${{ steps.filter.outputs.pages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "worker=$(echo "$CHANGED" | grep -qE '^(worker/|wrangler\.toml|schema\.sql)' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "pages=$(echo "$CHANGED" | grep -qE '^(src/|public/|package|astro\.config)' && echo true || echo false)" >> $GITHUB_OUTPUT

  deploy-worker:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  deploy-pages:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.pages == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name cloud-whats-new --branch main --commit-hash=${{ github.sha }}

      - name: Cleanup old Pages deployments (keep latest 3)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: cloud-whats-new
        run: |
          python3 - <<'EOF'
          import json, urllib.request, urllib.error, os, sys

          token   = os.environ['CF_TOKEN']
          account = os.environ['CF_ACCOUNT']
          project = os.environ['PROJECT']
          keep    = 3

          url = f"https://api.cloudflare.com/client/v4/accounts/{account}/pages/projects/{project}/deployments?per_page=100"
          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
          data = json.loads(urllib.request.urlopen(req).read())['result']

          prod    = [d for d in data if d.get('environment') == 'production']
          preview = [d for d in data if d.get('environment') != 'production']
          to_delete = prod[keep:] + preview

          print(f"Production: {len(prod)} total, keeping {min(keep, len(prod))}, deleting {len(prod[keep:])}")
          print(f"Preview: {len(preview)} total, deleting all")

          for d in to_delete:
              del_url = f"https://api.cloudflare.com/client/v4/accounts/{account}/pages/projects/{project}/deployments/{d['id']}?force=true"
              req = urllib.request.Request(del_url, method="DELETE", headers={"Authorization": f"Bearer {token}"})
              try:
                  urllib.request.urlopen(req)
                  print(f"Deleted {d['id'][:8]} ({d.get('environment')}, {d['created_on'][:10]})")
              except urllib.error.HTTPError as e:
                  print(f"Failed {d['id'][:8]}: {e.code}", file=sys.stderr)
          EOF
