name: Deploy All
on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      worker: ${{ steps.filter.outputs.worker }}
      pages: ${{ steps.filter.outputs.pages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "worker=$(echo "$CHANGED" | grep -qE '^(worker/|wrangler\.toml|schema\.sql)' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "pages=$(echo "$CHANGED" | grep -qE '^(src/|public/|package|astro\.config)' && echo true || echo false)" >> $GITHUB_OUTPUT

  deploy-worker:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  deploy-pages:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.pages == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name cloud-whats-new --branch main --commit-hash=${{ github.sha }}
