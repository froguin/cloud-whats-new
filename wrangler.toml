name = "cloud-whats-new"
compatibility_date = "2026-03-01"
account_id = "38e65f79cdcaa062a73dfda669b8bb7d"

main = "worker/index.js"

[[d1_databases]]
binding = "DB"
database_name = "cloud-whats-new"
database_id = "69d6bd74-5851-4ff1-98ee-521d89830eff"

[[queues.producers]]
binding = "TRANSLATION_QUEUE"
queue = "cloud-whats-new-translation-jobs"

[[queues.consumers]]
queue = "cloud-whats-new-translation-jobs"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "cloud-whats-new-translation-jobs-dlq"

[triggers]
crons = ["*/1 * * * *"]

[ai]
binding = "AI"

# Alert webhook (Discord/Slack) — set via wrangler secret
# wrangler secret put ALERT_WEBHOOK_URL
# Key ring for protected APIs and MCP
# wrangler secret put API_KEY_RING
# Recovery token for emergency admin access
# wrangler secret put API_KEY_RECOVERY_TOKEN
[vars]
ALERT_WEBHOOK_URL = ""
SITE_URL = "https://whats-new.kr"
BACKLOG_QUEUE_BATCH_SIZE = "25"
AUTH_ENFORCEMENT = "on"
TRUSTED_IP_BYPASS = "on"
ALLOWED_ADMIN_IPS = "211.207.226.107"


[env.production.vars]
SITE_URL = "https://whats-new.kr"
BACKLOG_QUEUE_BATCH_SIZE = "25"
AUTH_ENFORCEMENT = "on"
TRUSTED_IP_BYPASS = "on"
ALLOWED_ADMIN_IPS = "211.207.226.107"

routes = [
  { pattern = "api.whats-new.kr", custom_domain = true }
]
