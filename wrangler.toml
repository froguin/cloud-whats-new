name = "cloud-whats-new"
compatibility_date = "2026-03-01"
account_id = "38e65f79cdcaa062a73dfda669b8bb7d"

main = "worker/index.js"

[[d1_databases]]
binding = "DB"
database_name = "cloud-whats-new"
database_id = "69d6bd74-5851-4ff1-98ee-521d89830eff"

[triggers]
crons = ["*/15 * * * *", "7,22,37,52 * * * *"]

[ai]
binding = "AI"

# Alert webhook (Discord/Slack) — set via wrangler secret
# wrangler secret put ALERT_WEBHOOK_URL
[vars]
ALERT_WEBHOOK_URL = ""
SITE_URL = "https://whats-new.kr"


[env.production.vars]
SITE_URL = "https://whats-new.kr"
